name: Download Images and Embed as Base64

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'URL of the page to fetch images from'
        required: true
        type: string
        default: 'https://example.com'

# اضافه کردن permission برای نوشتن در مخزن
permissions:
  contents: write
  actions: read

jobs:
  fetch-and-embed-images:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install axios cheerio

    - name: Create directories
      run: mkdir -p downloaded_images output

    - name: Run image downloader and base64 embedder
      env:
        PAGE_URL: ${{ github.event.inputs.page_url }}
      run: node scripts/download-and-embed.js

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add downloaded_images/ output/ || true
        if ! git diff --cached --quiet; then
          git commit -m "Add downloaded images and embedded base64 HTML gallery"
          git push
        else
          echo "No changes to commit"
        fi
