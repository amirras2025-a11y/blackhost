name: Website Image Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to scrape images from'
        required: true
        type: string
      max_images:
        description: 'Maximum number of images to download'
        required: false
        default: 50
        type: number

jobs:
  download-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install playwright pillow
        playwright install chromium
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run image scraper
      run: |
        xvfb-run --auto-servernum python scrape_images.py "${{ inputs.url }}" "${{ inputs.max_images }}"

    - name: Commit and push images + HTML
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add images/ index.html
        git commit -m "Scraped images from ${{ inputs.url }}" || echo "No changes"
        git push
