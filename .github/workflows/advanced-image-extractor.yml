name: Video Thumbnail Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g. a category or search page with video thumbnails)'
        required: true
        type: string
      max_items:
        description: 'Maximum number of thumbnails to extract'
        required: false
        default: 30
        type: number

jobs:
  scrape-thumbnails:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install playwright pillow
        playwright install chromium
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run thumbnail scraper
      run: |
        xvfb-run --auto-servernum python scrape_thumbnails.py "${{ inputs.url }}" "${{ inputs.max_items }}"

    - name: Commit and push HTML
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # فقط فایل index.html را اضافه کن (پوشه images وجود ندارد)
        git add index.html
        git commit -m "Add video thumbnails from ${{ inputs.url }}" || echo "No changes to commit"
        git push
