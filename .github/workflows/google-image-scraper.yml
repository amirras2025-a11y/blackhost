name: Google Image Scraper

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        type: string
      limit:
        description: 'Number of images (max 100)'
        required: false
        default: '30'
        type: string
      safe:
        description: 'Safe search filter (false for all results)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for alternative package)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Install Node.js alternative (optional)
        run: |
          npm init -y
          npm install scrape-google-images
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound-dev

      - name: Run image scraper (Python version)
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          IMAGE_LIMIT: ${{ inputs.limit }}
          SAFE_MODE: ${{ inputs.safe }}
        run: python google_image_scraper.py

      - name: Commit and push HTML gallery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add image gallery for: ${{ inputs.query }}" || echo "No changes"
          git push
