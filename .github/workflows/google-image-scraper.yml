name: Google-Image-Scraper

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        type: string
      limit:
        description: 'Number of images (max 100)'
        required: false
        default: '30'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install icrawler

      - name: Run scraper
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          IMAGE_LIMIT: ${{ inputs.limit }}
        run: python scraper.py

      - name: Commit and push HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add image gallery for: ${{ inputs.query }}" || echo "No changes to commit"
          git push
