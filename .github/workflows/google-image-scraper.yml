name: جستجوی تصاویر با موتورهای مختلف

on:
  workflow_dispatch:
    inputs:
      query:
        description: '🔍 عبارت جستجو (مثال: sunset, cat, mountain)'
        required: true
        type: string
        default: 'landscape'
      limit:
        description: '📸 حداکثر تعداد تصاویر (حداکثر ۱۰۰)'
        required: false
        type: number
        default: 30
      engines:
        description: '⚙️ موتورهای جستجو (با کاما جدا کنید) | گزینه‌های مجاز: google, bing, ddg, yandex'
        required: false
        type: string
        default: 'bing,ddg'

jobs:
  search-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: 🟢 نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 نصب کتابخانه‌های مورد نیاز
        run: |
          npm init -y
          npm install imgsearch-api playwright

      - name: 🔧 نصب وابستگی‌های سیستمی مرورگر (Puppeteer/Playwright)
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound-dev libxshmfence1

      - name: 🕷️ اجرای اسکریپت جستجو
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          SEARCH_LIMIT: ${{ inputs.limit }}
          SEARCH_ENGINES: ${{ inputs.engines }}
        run: node search.js

      - name: 📤 ذخیره فایل HTML در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html || true
          git commit -m "گالری تصاویر: ${{ inputs.query }}" || echo "تغییری وجود ندارد"
          git push
