name: Google Image Scraper

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (e.g., "cats", "mountain landscape")'
        required: true
        type: string
      limit:
        description: 'Maximum number of images (max 100)'
        required: false
        default: '30'
        type: string
      safe:
        description: 'Safe search filter (true = blurred/filtered, false = all results)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install scrape-google-images

      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm-dev \
            libxkbcommon-dev \
            libgbm-dev \
            libasound-dev \
            libxshmfence1

      - name: Run image scraper
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          IMAGE_LIMIT: ${{ inputs.limit }}
          SAFE_MODE: ${{ inputs.safe }}
        run: node scraper.js

      - name: Commit and push HTML gallery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add image gallery for: ${{ inputs.query }}" || echo "No changes to commit"
          git push
