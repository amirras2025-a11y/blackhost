name: SOCKS5 Proxy Python

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup Python SOCKS5
        run: |
          pip install PySocks
          python3 << EOF
          import socket
          import socks
          import threading
          
          def handle_client(client_socket):
              remote_socket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              remote_socket.connect(('8.8.8.8', 53))
              while True:
                  data = client_socket.recv(4096)
                  if not data:
                      break
                  remote_socket.send(data)
                  client_socket.send(remote_socket.recv(4096))
              client_socket.close()
          
          server = socks.socksocket(socket.AF_INET, socket.SOCK_STREAM)
          server.bind(('0.0.0.0', 8080))
          server.listen(5)
          print("SOCKS5 proxy running on port 8080")
          
          while True:
              client, addr = server.accept()
              threading.Thread(target=handle_client, args=(client,)).start()
          EOF
