name: 🚀 VLESS Xray Proxy Builder v2

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ مدت زمان اجرا (دقیقه، حداکثر ۳۴۵)'
        required: true
        default: '300'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '345'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: 📥 Checkout مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 بررسی وضعیت پورت‌ها
        run: |
          echo "========== پورت‌های در حال استفاده =========="
          sudo netstat -tlnp || ss -tlnp
          echo ""
          echo "========== فضای دیسک =========="
          df -h /tmp
          echo ""
          echo "========== معماری سیستم =========="
          uname -m

      - name: 📦 دانلود و نصب Xray
        run: |
          echo "دانلود Xray..."
          cd /tmp
          
          # دانلود نسخه پایدار
          wget -q --show-progress --timeout=30 \
            "https://github.com/XTLS/Xray-core/releases/download/v1.8.21/Xray-linux-64.zip" \
            -O xray.zip || \
          wget -q --show-progress --timeout=30 \
            "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip" \
            -O xray.zip
          
          if [ ! -f xray.zip ]; then
            echo "❌ دانلود ناموفق"
            exit 1
          fi
          
          echo "استخراج فایل‌ها..."
          unzip -o xray.zip -d xray_temp
          chmod +x xray_temp/xray
          
          # تست اجرا
          ./xray_temp/xray version
          echo "✅ Xray آماده است"

      - name: 🔑 تولید UUID و ساخت کانفیگ
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "UUID=$UUID" >> $GITHUB_ENV
          
          # ساخت فایل کانفیگ
          mkdir -p /tmp/xray_config
          cat > /tmp/xray_config/config.json << EOF
          {
            "log": {
              "loglevel": "debug",
              "access": "/tmp/xray_access.log",
              "error": "/tmp/xray_error.log"
            },
            "inbounds": [
              {
                "port": 8080,
                "protocol": "vless",
                "settings": {
                  "clients": [
                    {
                      "id": "${UUID}",
                      "level": 0
                    }
                  ],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "none",
                  "wsSettings": {
                    "path": "/proxy"
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom",
                "settings": {}
              }
            ]
          }
          EOF
          
          echo "✅ کانفیگ ساخته شد:"
          cat /tmp/xray_config/config.json

      - name: 🚀 راه‌اندازی و تست Xray
        run: |
          cd /tmp/xray_temp
          
          echo "شروع Xray..."
          # اجرا در پس‌زمینه
          nohup ./xray run -config /tmp/xray_config/config.json > /tmp/xray_stdout.log 2>&1 &
          XRAY_PID=$!
          echo "PID: $XRAY_PID"
          
          # صبر برای راه‌اندازی
          sleep 5
          
          # بررسی زنده بودن پروسه
          if kill -0 $XRAY_PID 2>/dev/null; then
            echo "✅ Xray در حال اجراست (PID: $XRAY_PID)"
          else
            echo "❌ Xray اجرا نشد!"
            echo ""
            echo "========== لاگ خطا =========="
            cat /tmp/xray_error.log 2>/dev/null || echo "فایل خطا خالی است"
            echo ""
            echo "========== لاگ استاندارد =========="
            cat /tmp/xray_stdout.log 2>/dev/null || echo "فایل stdout خالی است"
            echo ""
            echo "========== تست دستی =========="
            ./xray run -config /tmp/xray_config/config.json -test
            exit 1
          fi
          
          # تست پورت
          sleep 2
          if netstat -tlnp 2>/dev/null | grep -q 8080 || ss -tlnp 2>/dev/null | grep -q 8080; then
            echo "✅ پورت 8080 باز است"
          else
            echo "⚠️ پورت 8080 پیدا نشد، اما Xray در حال اجراست"
            netstat -tlnp 2>/dev/null || ss -tlnp 2>/dev/null
          fi

      - name: 🌐 دریافت آی‌پی
        run: |
          IP=$(curl -s --max-time 10 ifconfig.me)
          if [ -z "$IP" ]; then
            IP=$(curl -s --max-time 10 ipinfo.io/ip)
          fi
          if [ -z "$IP" ]; then
            IP=$(curl -s --max-time 10 icanhazip.com)
          fi
          
          if [ -z "$IP" ]; then
            echo "❌ خطا در دریافت آی‌پی"
            exit 1
          fi
          
          echo "IP=$IP" >> $GITHUB_ENV
          
          START_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          END_TIME=$(date -u -d "+${{ github.event.inputs.duration }} minutes" '+%Y-%m-%d %H:%M:%S')
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "END_TIME=$END_TIME" >> $GITHUB_ENV
          
          # ساخت لینک
          VLESS_LINK="vless://${UUID}@${IP}:8080?encryption=none&security=none&type=ws&path=%2Fproxy#GitHub-Proxy"
          echo "VLESS_LINK=$VLESS_LINK" >> $GITHUB_ENV
          
          echo "✅ آی‌پی: $IP"
          echo "✅ لینک: $VLESS_LINK"

      - name: 📝 ساخت و آپلود فایل‌های کانفیگ
        run: |
          mkdir -p configs
          
          # فایل لینک خالص
          echo "${VLESS_LINK}" > VLESS_LINK.txt
          
          # فایل اطلاعات کامل
          cat > CONNECTION_INFO.md << EOF
          # 🟢 پروکسی VLESS آماده استفاده

          **وضعیت:** 🟢 آنلاین  
          **اعتبار:** تا ${END_TIME} UTC

          ## لینک مستقیم
          \`\`\`
          ${VLESS_LINK}
          \`\`\`

          ## تنظیمات دستی
          | پارامتر | مقدار |
          |---------|-------|
          | پروتکل | VLESS |
          | آدرس | ${IP} |
          | پورت | 8080 |
          | UUID | ${UUID} |
          | Network | ws |
          | Path | /proxy |
          | Encryption | none |

          ## زمان‌بندی
          - شروع: ${START_TIME} UTC
          - پایان: ${END_TIME} UTC
          - مدت: ${{ github.event.inputs.duration }} دقیقه

          ---
          ⚠️ موقت - پس از پایان غیرفعال می‌شود
          EOF
          
          # آپلود
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add VLESS_LINK.txt CONNECTION_INFO.md configs/
          git commit -m "🟢 سرور فعال - ${START_TIME}" || echo "بدون تغییر"
          
          # تلاش برای push
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref }} 2>/dev/null; then
              echo "✅ Push موفق (تلاش $i)"
              break
            else
              echo "⚠️ تلاش $i ناموفق - pull و تلاش مجدد..."
              git pull --rebase origin ${{ github.ref }} 2>/dev/null || true
              sleep 2
            fi
          done
          
          echo ""
          echo "═══════════════════════════════════════"
          echo "  📋 لینک پروکسی:"
          echo "  ${VLESS_LINK}"
          echo "═══════════════════════════════════════"

      - name: ⏳ فعال نگه داشتن سرور
        run: |
          DURATION=${{ github.event.inputs.duration }}
          
          echo "⏳ سرور برای ${DURATION} دقیقه فعال می‌ماند..."
          echo "فایل‌ها در مخزن آپلود شدند"
          echo ""
          
          for ((i=1; i<=DURATION; i++)); do
            sleep 60
            REMAIN=$((DURATION - i))
            
            # چک سلامت هر ۵ دقیقه
            if [ $((i % 5)) -eq 0 ]; then
              if pgrep -f "xray run" > /dev/null; then
                echo "✅ [$i/${DURATION}] فعال - ${REMAIN} دقیقه باقی‌مانده"
              else
                echo "⚠️ [$i/${DURATION}] Xray از کار افتاده!"
                # راه‌اندازی مجدد
                cd /tmp/xray_temp
                nohup ./xray run -config /tmp/xray_config/config.json > /tmp/xray_stdout.log 2>&1 &
                echo "🔄 تلاش برای راه‌اندازی مجدد..."
              fi
            fi
          done
          
          echo ""
          echo "⏹️ زمان پایان"
          
          # علامت آفلاین
          cat > SERVER_STATUS.md << EOF
          # 🔴 سرور خاموش
          
          خاموش شده در: $(date -u '+%Y-%m-%d %H:%M:%S') UTC  
          مدت اجرا: ${DURATION} دقیقه
          EOF
          
          git add SERVER_STATUS.md
          git commit -m "🔴 سرور خاموش" 2>/dev/null || true
          git push origin HEAD:${{ github.ref }} 2>/dev/null || true
