name: 🚀 VLESS Xray Proxy Builder

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ مدت زمان اجرا (دقیقه، حداکثر ۳۴۵)'
        required: true
        default: '300'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '345'

permissions:
  contents: write  # اجازه نوشتن در مخزن

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: 📥 Checkout مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📦 دانلود و نصب مستقیم Xray
        run: |
          echo "📥 در حال دانلود Xray..."
          sudo mkdir -p /usr/local/etc/xray /var/log/xray
          
          # دانلود آخرین نسخه
          curl -L --retry 3 --retry-delay 5 -o /tmp/xray.zip \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          
          sudo unzip -o /tmp/xray.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          
          echo "✅ Xray نسخه $(/usr/local/bin/xray version | head -1) نصب شد"

      - name: 🔑 تولید UUID و کلیدهای امنیتی
        id: keys
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          SHORT_ID=$(head -c 8 /dev/urandom | xxd -p)
          
          echo "UUID=$UUID" >> $GITHUB_ENV
          echo "SHORT_ID=$SHORT_ID" >> $GITHUB_ENV
          
          echo "✓ UUID: $UUID"
          echo "✓ Short ID: $SHORT_ID"

      - name: ⚙️ ساخت فایل کانفیگ Xray
        run: |
          sudo bash -c "cat > /usr/local/etc/xray/config.json << 'EOCONFIG'
          {
            \"log\": {
              \"loglevel\": \"warning\"
            },
            \"inbounds\": [
              {
                \"port\": 443,
                \"protocol\": \"vless\",
                \"settings\": {
                  \"clients\": [
                    {
                      \"id\": \"${UUID}\",
                      \"level\": 0,
                      \"email\": \"user@github-proxy.local\"
                    }
                  ],
                  \"decryption\": \"none\"
                },
                \"streamSettings\": {
                  \"network\": \"ws\",
                  \"security\": \"none\",
                  \"wsSettings\": {
                    \"path\": \"/proxy\",
                    \"headers\": {
                      \"Host\": \"cloudflare.com\"
                    }
                  }
                },
                \"sniffing\": {
                  \"enabled\": true,
                  \"destOverride\": [\"http\", \"tls\"]
                }
              }
            ],
            \"outbounds\": [
              {
                \"protocol\": \"freedom\",
                \"settings\": {},
                \"tag\": \"direct\"
              }
            ]
          }
          EOCONFIG"
          
          echo "✅ فایل کانفیگ Xray ساخته شد"

      - name: 🚀 راه‌اندازی سرویس Xray
        run: |
          sudo bash -c 'cat > /etc/systemd/system/xray.service << EOF
          [Unit]
          Description=Xray Service
          After=network.target
          
          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/xray run -config /usr/local/etc/xray/config.json
          Restart=on-failure
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
          EOF'
          
          sudo systemctl daemon-reload
          sudo systemctl enable xray
          sudo systemctl start xray
          sleep 3
          
          if sudo systemctl is-active --quiet xray; then
            echo "✅ سرویس Xray با موفقیت راه‌اندازی شد"
          else
            echo "❌ خطا در راه‌اندازی Xray"
            sudo systemctl status xray --no-pager
            exit 1
          fi

      - name: 🌐 دریافت آی‌پی و ساخت کانفیگ‌ها
        id: config
        run: |
          IP=$(curl -s ifconfig.me || curl -s ipinfo.io/ip || curl -s icanhazip.com)
          
          if [ -z "$IP" ]; then
            echo "❌ خطا در دریافت آی‌پی"
            exit 1
          fi
          
          echo "IP=$IP" >> $GITHUB_ENV
          
          # ساخت لینک VLESS
          VLESS_LINK="vless://${UUID}@${IP}:443?encryption=none&security=none&type=ws&path=%2Fproxy&host=cloudflare.com#GitHub-Proxy-${SHORT_ID}"
          echo "VLESS_LINK=${VLESS_LINK}" >> $GITHUB_ENV
          
          # ساخت کد QR در قالب متن (برای Happ)
          echo "vmess://$(echo -n "vless://${UUID}@${IP}:443?encryption=none&security=none&type=ws&path=%2Fproxy&host=cloudflare.com#GitHub-Proxy" | base64 -w 0)" > /tmp/qr_vmess.txt || true
          
          # زمان‌ها
          START_TIME=$(date '+%Y-%m-%d %H:%M:%S' -u)
          END_TIME=$(date -d "+${DURATION} minutes" '+%Y-%m-%d %H:%M:%S' -u)
          
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "END_TIME=$END_TIME" >> $GITHUB_ENV
          
          echo ""
          echo "✅ آی‌پی سرور: $IP"
          echo "✅ لینک VLESS ساخته شد"

      - name: 📝 ایجاد فایل‌های کانفیگ
        run: |
          mkdir -p configs
          
          # ۱. فایل کانفیگ کامل (Markdown)
          cat > configs/PROXY_CONFIG.md << 'ENDCONFIG'
          # 🟢 کانفیگ سرور پروکسی گیتهاب

          ## 📋 اطلاعات اتصال

          | تنظیم | مقدار |
          |--------|-------|
          | **پروتکل** | `VLESS` |
          | **آدرس (Address)** | `$IP` |
          | **پورت (Port)** | `443` |
          | **UUID** | `$UUID` |
          | **Encryption** | `none` |
          | **Network** | `ws` |
          | **Security** | `none` |
          | **Path** | `/proxy` |
          | **Host Header** | `cloudflare.com` |

          ## 🔗 لینک مستقیم (در Happ پیست کنید)
