name: SOCKS5 Proxy via SSH

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup SSH SOCKS Tunnel
        run: |
          # نصب SSH (روی ubuntu-latest نصب هست)
          sudo apt-get update
          sudo apt-get install -y openssh-server
          
          # ایجاد کاربر موقت
          sudo useradd -m -s /bin/bash proxyuser
          echo "proxyuser:pass123" | sudo chpasswd
          
          # راه‌اندازی SSH dynamic forwarding
          sudo ssh -D 0.0.0.0:8080 -N -f proxyuser@localhost
          
          echo "SOCKS5 proxy running on port 8080"
          sleep 6h
