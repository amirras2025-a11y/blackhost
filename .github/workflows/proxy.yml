name: SOCKS5 Proxy

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup SOCKS5 with Docker
        run: |
          docker run -d --name socks5 -p 8080:1080 serjs/socks5-server
          echo "SOCKS5 proxy running on port 8080"
          sleep 6h
