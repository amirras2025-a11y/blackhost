name: SOCKS5 Proxy

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup Dante SOCKS5
        run: |
          sudo apt-get update
          sudo apt-get install -y dante-server
          sudo bash -c 'cat > /etc/danted.conf << EOF
          logoutput: syslog
          internal: 0.0.0.0 port = 1080
          external: eth0
          method: username none
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
          }
          pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              protocol: tcp udp
          }
          EOF'
          sudo systemctl start danted
          echo "SOCKS5 proxy running on port 1080"
          sleep 6h
