name: 🚀 VMess Anti-DPI Proxy (Fixed)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ مدت زمان (دقیقه، حداکثر ۳۴۵)'
        required: true
        default: '300'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '345'

permissions:
  contents: write

jobs:
  vmess-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: 📥 Checkout مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔓 فعال‌سازی دسترسی به پورت‌های پایین
        run: |
          # راه‌حل ۱: اجازه binding به binary خاص
          sudo setcap 'cap_net_bind_service=+ep' /tmp/xray_temp/xray 2>/dev/null || true
          
          # راه‌حل ۲: کاهش محدودیت پورت (اگه راه‌حل ۱ جواب نداد)
          echo "net.ipv4.ip_unprivileged_port_start=80" | sudo tee /etc/sysctl.d/99-ports.conf
          sudo sysctl -p /etc/sysctl.d/99-ports.conf

      - name: 📦 دانلود و نصب Xray
        run: |
          cd /tmp
          
          # دانلود
          wget -q --timeout=30 \
            "https://github.com/XTLS/Xray-core/releases/download/v1.8.21/Xray-linux-64.zip" \
            -O xray.zip || \
          curl -L -o xray.zip \
            "https://github.com/XTLS/Xray-core/releases/download/v1.8.21/Xray-linux-64.zip"
          
          if [ ! -f xray.zip ]; then
            echo "❌ دانلود ناموفق"
            exit 1
          fi
          
          unzip -o xray.zip -d xray_temp
          chmod +x xray_temp/xray
          
          # حالا setcap رو اجرا کن
          sudo setcap 'cap_net_bind_service=+ep' xray_temp/xray
          
          echo "✅ Xray نصب و آماده شد"

      - name: 🔑 ساخت کانفیگ VMess
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "UUID=$UUID" >> $GITHUB_ENV
          
          mkdir -p /tmp/xray_config
          cat > /tmp/xray_config/config.json << 'ENDOFCONFIG'
          {
            "log": {
              "loglevel": "warning"
            },
            "inbounds": [
              {
                "port": 443,
                "protocol": "vmess",
                "settings": {
                  "clients": [
                    {
                      "id": "PLACEHOLDER_UUID",
                      "alterId": 0,
                      "security": "auto"
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/ws",
                    "headers": {
                      "Host": "github.com"
                    }
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom",
                "settings": {}
              }
            ]
          }
          ENDOFCONFIG
          
          sed -i "s/PLACEHOLDER_UUID/${UUID}/g" /tmp/xray_config/config.json
          echo "✅ کانفیگ ساخته شد"

      - name: 🚀 راه‌اندازی Xray روی پورت ۴۴۳
        run: |
          cd /tmp/xray_temp
          
          # روش ۱: اجرا با sudo در پس‌زمینه
          sudo nohup ./xray run -config /tmp/xray_config/config.json > /tmp/xray.log 2>&1 &
          XRAY_PID=$!
          
          sleep 5
          
          if kill -0 $XRAY_PID 2>/dev/null; then
            echo "✅ Xray با sudo اجرا شد (PID: $XRAY_PID)"
          else
            echo "⚠️ روش اول ناموفق - تلاش با setcap..."
            
            # روش ۲: با setcap قبلی
            nohup ./xray run -config /tmp/xray_config/config.json > /tmp/xray.log 2>&1 &
            XRAY_PID=$!
            sleep 5
            
            if kill -0 $XRAY_PID 2>/dev/null; then
              echo "✅ Xray با setcap اجرا شد (PID: $XRAY_PID)"
            else
              echo "❌ هر دو روش ناموفق"
              cat /tmp/xray.log
              exit 1
            fi
          fi
          
          # بررسی پورت
          sleep 2
          sudo ss -tlnp | grep 443 || sudo netstat -tlnp | grep 443 || echo "⚠️ پورت پیدا نشد ولی Xray در حال اجراست"

      - name: 🌐 دریافت آی‌پی
        run: |
          IP=""
          for service in "ifconfig.me" "ipinfo.io/ip" "icanhazip.com" "api.ipify.org"; do
            IP=$(curl -s --max-time 5 "$service" 2>/dev/null)
            if [ -n "$IP" ] && [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              break
            fi
          done
          
          if [ -z "$IP" ]; then
            echo "❌ خطا در دریافت آی‌پی"
            exit 1
          fi
          
          echo "IP=$IP" >> $GITHUB_ENV
          echo "✅ آی‌پی: $IP"

      - name: 🔗 ساخت لینک VMess
        run: |
          CLIENT_CONFIG=$(cat << ENDJSON
          {
            "v": "2",
            "ps": "GitHub-Proxy-443",
            "add": "${IP}",
            "port": "443",
            "id": "${UUID}",
            "aid": "0",
            "scy": "auto",
            "net": "ws",
            "type": "none",
            "host": "github.com",
            "path": "/ws",
            "tls": "",
            "sni": "",
            "alpn": ""
          }
          ENDJSON
          )
          
          VMESS_LINK="vmess://$(echo -n "$CLIENT_CONFIG" | base64 -w 0)"
          echo "VMESS_LINK=$VMESS_LINK" >> $GITHUB_ENV
          
          START_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          END_TIME=$(date -u -d "+${{ github.event.inputs.duration }} minutes" '+%Y-%m-%d %H:%M:%S')
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          echo "END_TIME=$END_TIME" >> $GITHUB_ENV
          
          echo "✅ لینک VMess ساخته شد"

      - name: 📝 ساخت و آپلود فایل‌ها
        run: |
          mkdir -p configs
          
          # لینک خالص
          echo "${VMESS_LINK}" > VLESS_LINK.txt
          
          # فایل اطلاعات
          cat > CONNECTION_INFO.md << ENDMD
          # 🟢 پروکسی VMess روی پورت ۴۴۳

          **وضعیت:** 🟢 آنلاین  
          **اعتبار:** تا ${END_TIME} UTC

          ## 🔗 لینک مستقیم (در Happ پیست کنید)
          \`\`\`
          ${VMESS_LINK}
          \`\`\`

          ## ⚙️ تنظیمات دستی
          | پارامتر | مقدار |
          |---------|-------|
          | پروتکل | VMess |
          | آدرس | \`${IP}\` |
          | پورت | \`443\` |
          | UUID | \`${UUID}\` |
          | Alter ID | \`0\` |
          | Security | \`auto\` |
          | Network | \`ws\` |
          | Path | \`/ws\` |
          | Host | \`github.com\` |

          ## ⏱️ زمان‌بندی
          - شروع: ${START_TIME} UTC
          - پایان: ${END_TIME} UTC
          - مدت: ${{ github.event.inputs.duration }} دقیقه

          ---
          ⚠️ این پروکسی موقت است. پس از پایان غیرفعال می‌شود.
          ENDMD
          
          # کانفیگ JSON
          echo "$CLIENT_CONFIG" | python3 -m json.tool > configs/vmess_config.json 2>/dev/null || echo "$CLIENT_CONFIG" > configs/vmess_config.json
          
          # آپلود
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add -A
          git commit -m "🟢 پروکسی VMess فعال روی پورت 443" || echo "بدون تغییر"
          
          for i in 1 2 3; do
            if git push origin HEAD:${{ github.ref }} 2>/dev/null; then
              echo "✅ آپلود موفق"
              break
            else
              git pull --rebase origin ${{ github.ref }} 2>/dev/null || true
              sleep 3
            fi
          done
          
          echo ""
          echo "════════════════════════════════════════════════"
          echo "  🎉 پروکسی VMess آماده!"
          echo ""
          echo "  📋 لینک مستقیم:"
          echo "  ${VMESS_LINK}"
          echo ""
          echo "  ⏱️  اعتبار: ${END_TIME} UTC"
          echo "════════════════════════════════════════════════"

      - name: ⏳ زنده نگه داشتن سرور
        run: |
          DURATION=${{ github.event.inputs.duration }}
          
          echo "⏳ سرور برای ${DURATION} دقیقه فعال می‌ماند..."
          
          for ((i=1; i<=DURATION; i++)); do
            sleep 60
            REMAIN=$((DURATION - i))
            
            if [ $((i % 5)) -eq 0 ]; then
              # بررسی سلامت
              if pgrep -f "xray run" > /dev/null; then
                echo "✅ [$i/${DURATION}] فعال - ${REMAIN} دقیقه باقی‌مانده"
              else
                echo "⚠️ [$i/${DURATION}] Xray خاموش - راه‌اندازی مجدد..."
                cd /tmp/xray_temp
                sudo nohup ./xray run -config /tmp/xray_config/config.json > /tmp/xray.log 2>&1 &
                sleep 3
                pgrep -f "xray run" > /dev/null && echo "✅ راه‌اندازی مجدد موفق" || echo "❌ راه‌اندازی مجدد ناموفق"
              fi
            fi
          done
          
          echo ""
          echo "⏹️ پایان زمان. سرور خاموش شد."
