name: 🚀 Temporary Proxy Builder

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ مدت زمان اجرای پروکسی (دقیقه، حداکثر ۳۴۰)'
        required: true
        default: '300'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '340'

jobs:
  create-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 📦 نصب ابزارهای مورد نیاز
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip openssh-client curl wget
          pip3 install --quiet pysocks flask requests
          echo "✅ ابزارهای مورد نیاز نصب شدند"

      - name: 🌐 ساخت پروکسی SOCKS5 با Dante
        run: |
          # نصب Dante (SOCKS5 Server)
          sudo apt-get install -y dante-server
          
          # پیکربندی Dante
          sudo bash -c 'cat > /etc/danted.conf << EOF
          logoutput: stderr
          internal: 0.0.0.0 port = 1080
          external: eth0
          method: username none
          clientmethod: none
          user.privileged: root
          user.notprivileged: nobody
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              log: connect disconnect error
          }
          pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              protocol: tcp udp
              log: connect disconnect error
          }
          EOF'
          
          # راه‌اندازی Dante
          sudo systemctl restart danted
          sudo systemctl enable danted
          echo "✅ پروکسی SOCKS5 روی پورت 1080 راه‌اندازی شد"

      - name: 🌐 ساخت پروکسی HTTP/HTTPS با Tinyproxy
        run: |
          # نصب Tinyproxy
          sudo apt-get install -y tinyproxy
          
          # پیکربندی Tinyproxy
          sudo bash -c 'cat > /etc/tinyproxy/tinyproxy.conf << EOF
          User tinyproxy
          Group tinyproxy
          Port 8888
          Timeout 600
          DefaultErrorFile "/usr/share/tinyproxy/default.html"
          StatFile "/usr/share/tinyproxy/stats.html"
          LogLevel Info
          MaxClients 100
          MinSpareServers 5
          MaxSpareServers 20
          StartServers 10
          MaxRequestsPerChild 0
          Allow 0.0.0.0/0
          ViaProxyName "github-proxy"
          ConnectPort 443
          ConnectPort 563
          ConnectPort 80
          EOF'
          
          # راه‌اندازی Tinyproxy
          sudo systemctl restart tinyproxy
          sudo systemctl enable tinyproxy
          echo "✅ پروکسی HTTP/HTTPS روی پورت 8888 راه‌اندازی شد"

      - name: 🔍 دریافت آی‌پی عمومی
        id: ip
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔵 آی‌پی عمومی سرور: $PUBLIC_IP"
          echo "════════════════════════════════════════════"

      - name: 📱 نمایش اطلاعات کامل پروکسی در لاگ
        run: |
          IP="${{ steps.ip.outputs.IP }}"
          END_TIME=$(date -d "+${{ github.event.inputs.duration }} minutes" '+%Y-%m-%d %H:%M:%S' -u)
          
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║                                                        ║"
          echo "║          🟢  پروکسی با موفقیت ساخته شد!                ║"
          echo "║                                                        ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║                                                        ║"
          echo "║  🌐 آی‌پی عمومی:                                       ║"
          echo "║     $IP                                      ║"
          echo "║                                                        ║"
          echo "║  📡 پروکسی SOCKS5:                                     ║"
          echo "║     آدرس: $IP                                  ║"
          echo "║     پورت: 1080                                         ║"
          echo "║     رمز عبور: ندارد                                    ║"
          echo "║                                                        ║"
          echo "║  🌍 پروکسی HTTP/HTTPS:                                 ║"
          echo "║     آدرس: $IP                                  ║"
          echo "║     پورت: 8888                                         ║"
          echo "║     رمز عبور: ندارد                                    ║"
          echo "║                                                        ║"
          echo "║  ⏰ زمان شروع:     $(date '+%Y-%m-%d %H:%M:%S' -u) UTC          ║"
          echo "║  ⏰ زمان پایان:    $END_TIME UTC          ║"
          echo "║  ⏳ مدت اعتبار:   ${{ github.event.inputs.duration }} دقیقه                              ║"
          echo "║                                                        ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║                                                        ║"
          echo "║  📱 تنظیمات گوشی اندروید:                              ║"
          echo "║                                                        ║"
          echo "║  ۱. برنامه Postern را نصب کنید                         ║"
          echo "║  ۲. پروکسی SOCKS5 با اطلاعات بالا بسازید               ║"
          echo "║  ۳. یا از مرورگر Kiwi با افزونه SwitchyOmega           ║"
          echo "║     برای پروکسی HTTP استفاده کنید                      ║"
          echo "║                                                        ║"
          echo "║  ⚠️  این پروکسی موقت است!                              ║"
          echo "║  ⚠️  پس از اتمام زمان، اتصال قطع می‌شود                ║"
          echo "║  ⚠️  برای تمدید، دوباره Workflow را اجرا کنید         ║"
          echo "║                                                        ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          
          # ذخیره اطلاعات برای مراحل بعدی
          echo "IP=$IP" >> $GITHUB_ENV

      - name: ⏳ زنده نگه داشتن پروکسی
        run: |
          DURATION_MINUTES="${{ github.event.inputs.duration }}"
          DURATION_SECONDS=$((DURATION_MINUTES * 60))
          
          echo ""
          echo "⏱️  پروکسی برای ${DURATION_MINUTES} دقیقه فعال می‌ماند..."
          echo "🕐  زمان پایان: $(date -d "+${DURATION_MINUTES} minutes" '+%Y-%m-%d %H:%M:%S' -u) UTC"
          echo "📊  برای تست، می‌توانید از دستور زیر در ترمینال استفاده کنید:"
          echo "    curl -x http://${{ steps.ip.outputs.IP }}:8888 http://ip-api.com/json"
          echo ""
          echo "🔄  هر ۶۰ ثانیه یکبار اتصال پروکسی بررسی می‌شود..."
          echo ""
          
          # حلقه زنده نگه داشتن و تست دوره‌ای
          for ((i=1; i<=DURATION_MINUTES; i++)); do
            sleep 60
            REMAINING=$((DURATION_MINUTES - i))
            
            # تست سریع پروکسی
            if [ $((i % 5)) -eq 0 ]; then
              echo "🔍 [$i/${DURATION_MINUTES} دقیقه] تست پروکسی SOCKS5..."
              timeout 5 curl -x socks5h://${{ steps.ip.outputs.IP }}:1080 -s http://ip-api.com/json | grep -o '"query":"[^"]*"' && echo "✅ SOCKS5 فعال است" || echo "⚠️ SOCKS5 خطا داد"
              
              echo "🔍 [$i/${DURATION_MINUTES} دقیقه] تست پروکسی HTTP..."
              timeout 5 curl -x http://${{ steps.ip.outputs.IP }}:8888 -s http://ip-api.com/json | grep -o '"query":"[^"]*"' && echo "✅ HTTP فعال است" || echo "⚠️ HTTP خطا داد"
              echo ""
            else
              echo "⏳ [$i/${DURATION_MINUTES} دقیقه] پروکسی فعال است... ($REMAINING دقیقه باقی‌مانده)"
            fi
          done
          
          echo ""
          echo "⏹️  زمان اجرا به پایان رسید. پروکسی غیرفعال می‌شود."
