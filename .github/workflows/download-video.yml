
> ⚡ روی لینک بالا کلیک کنید یا کپی کنید
draft: false
prerelease: false

- name: 🔗 ساخت لینک مستقیم
run: |
# استخراج لینک از Release
REPO="${{ github.repository }}"
TAG="video-${{ github.run_id }}"

# URL-encode نام فایل
ENCODED_FILENAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.FILE_NAME }}'))")

DIRECT_LINK="https://github.com/${REPO}/releases/download/${TAG}/${ENCODED_FILENAME}"

echo "DIRECT_LINK=$DIRECT_LINK" >> $GITHUB_ENV

echo ""
echo "══════════════════════════════════════════════════════"
echo "  🔗 لینک دانلود مستقیم:"
echo "  $DIRECT_LINK"
echo "══════════════════════════════════════════════════════"

- name: 📤 آپلود به Artifact (پشتیبان)
uses: actions/upload-artifact@v4
with:
name: ${{ env.FILE_NAME }}
path: ${{ env.VIDEO_PATH }}
retention-days: 90
compression-level: 0

- name: ✅ نمایش نتیجه نهایی
run: |
echo ""
echo "╔══════════════════════════════════════════════════════════╗"
echo "║                                                          ║"
echo "║              🎉 دانلود و آپلود کامل شد!                  ║"
echo "║                                                          ║"
echo "╠══════════════════════════════════════════════════════════╣"
echo "║                                                          ║"
echo "║  📹 نام فایل: ${FILE_NAME}"
echo "║  📦 حجم:      ${FILE_SIZE}"
echo "║                                                          ║"
echo "║  🔗 لینک دانلود مستقیم (کلیک کنید):                     ║"
echo "║  ${DIRECT_LINK}"
echo "║                                                          ║"
echo "║  📥 روش‌های دانلود:                                     ║"
echo "║  ۱. کلیک روی لینک بالا                                  ║"
echo "║  ۲. تب Releases در مخزن                                 ║"
echo "║  ۳. تب Actions > Artifacts                              ║"
echo "║                                                          ║"
echo "║  💡 لینک مستقیم تا زمانی که Release حذف نشه کار میکنه   ║"
echo "║                                                          ║"
echo "╚══════════════════════════════════════════════════════════╝"
echo ""
echo "📋 برای کپی کردن، لینک زیر هست:"
echo "${DIRECT_LINK}"
