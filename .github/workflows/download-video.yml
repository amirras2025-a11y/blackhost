name: Automated Video Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        default: 'best'
        type: choice
        options:
        - best
        - 1080p
        - 720p
        - 480p
        - audio

jobs:
  download-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      YT_EMAIL: ${{ secrets.YT_EMAIL }}
      YT_PASSWORD: ${{ secrets.YT_PASSWORD }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install yt-dlp playwright
        playwright install chromium
        sudo apt-get update
        sudo apt-get install -y ffmpeg xvfb

    - name: Run download script
      run: |
        xvfb-run --auto-servernum python main.py "${{ inputs.url }}" "${{ inputs.quality }}"
      continue-on-error: false

    - name: Upload final ZIP
      uses: actions/upload-artifact@v4
      with:
        name: downloaded-video-${{ github.run_id }}
        path: "*.zip"
        retention-days: 90

    - name: Commit and push to repository
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add downloads.zip
        git commit -m "Add downloaded video [skip ci]" || echo "No changes to commit"
        git push
