<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .video-container {
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            max-height: 70vh;
            display: block;
        }
        .video-info {
            padding: 24px;
            color: white;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            background: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: normal;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .meta-item strong {
            color: #f1c40f;
        }
        .source-link {
            color: #3498db;
            text-decoration: none;
            word-break: break-all;
        }
        .source-link:hover {
            text-decoration: underline;
        }
        .download-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s, background 0.2s;
        }
        .download-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .copy-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .copy-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.3rem; }
            .meta-grid { grid-template-columns: 1fr; }
            .download-section { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-card">
            <div class="video-container">
                <video controls autoplay>
                    <source src="../downloaded_videos/video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="video-info">
                <h1>
                    🎬 
                    <span class="badge">MP4</span>
                </h1>
                <div class="meta-grid">
                    <div class="meta-item">⏱️ <strong>Duration:</strong> 5m 3s</div>
                    <div class="meta-item">👤 <strong>Uploader:</strong> Unknown</div>
                    <div class="meta-item">💾 <strong>File Size:</strong> 7.2M</div>
                    <div class="meta-item">🌐 <strong>Source:</strong> <a href="https://www.pornhub.com/view_video.php?viewkey=659876e67fcb5" class="source-link" target="_blank">https://www.pornhub.com/view_video.php?viewkey=659876e67fcb5</a></div>
                </div>
                <div class="download-section">
                    <a href="../downloaded_videos/video.mp4" download class="download-btn">
                        ⬇️ Download Video
                    </a>
                    <button class="copy-btn" onclick="copyToClipboard(window.location.href)">
                        📋 Copy Gallery Link
                    </button>
                </div>
            </div>
        </div>
        <div class="footer">
            🤖 Downloaded using yt-dlp on GitHub Actions • Video is stored directly in this repository
        </div>
    </div>
    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✓ Link copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy');
            });
        }
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
